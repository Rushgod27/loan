import { getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

onAuthStateChanged(auth, async user=>{
  if(!user){location.href="index.html";return;}

  uid = user.uid;

  const snap = await getDoc(doc(db,"users",uid));

  if(!snap.exists() || snap.data().role !== "agent"){
    location.href = "index.html";
    return;
  }

  ownerId = snap.data().approvedBy;

  agentName = snap.data().name || 
              user.displayName || 
              user.email?.split("@")[0] || 
              "Agent";

  startRealtime();

  // 🔥 THIS LINE FIXES THE DASHBOARD
  setActive("dashboard");
});
function startRealtime(){

  // BORROWERS
  onSnapshot(
    query(collection(db,"borrowers"),where("agentId","==",uid)),
    s=>{
      state.borrowers=[];
      s.forEach(d=>state.borrowers.push({id:d.id,...d.data()}));
scheduleRefresh();
    }
  );

  // LOANS
  onSnapshot(
    query(collection(db,"loans"),where("agentId","==",uid)),
    s=>{
      state.loans=[];
      s.forEach(d=>state.loans.push({id:d.id,...d.data()}));
scheduleRefresh();
    }
  );

  // INSTALLMENTS
  onSnapshot(
  query(
    collection(db,"installments"),
    where("agentId","==",uid),
    where("status","==","pending")
  ),
  s=>{
    state.installments=[];
    s.forEach(d=>state.installments.push({id:d.id,...d.data()}));
    scheduleRefresh();
  }
);
  onSnapshot(
  query(collection(db,"installments_completed"),where("agentId","==",uid)),
  s=>{
    state.completedInstallments=[];
    s.forEach(d=>state.completedInstallments.push({id:d.id,...d.data()}));
    scheduleRefresh();
  }
);

  // COLLECTIONS
  onSnapshot(
    query(collection(db,"collections"),where("agentId","==",uid)),
    s=>{
      state.collections=[];
      s.forEach(d=>state.collections.push({id:d.id,...d.data()}));
scheduleRefresh();
    }
  );

  // 🔥 DOCUMENTS (NEW COLLECTION)
  onSnapshot(
    query(collection(db,"documents"),where("agentId","==",uid)),
    s=>{
      state.documents=[];
      s.forEach(d=>state.documents.push({id:d.id,...d.data()}));
scheduleRefresh();
    }
  );

}

function refresh(){

  if(currentView==="dashboard"){
    renderDashboard();
    return;
  }

  if(currentView==="borrowers"){
    renderBorrowers();
    return;
  }

  if(currentView==="profile" && currentProfileId){
    renderProfile(currentProfileId);
  }
}

function setActive(view){

borrowersSection.classList.add("hidden");
profileSection.classList.add("hidden");

document.getElementById("tabDashboard")?.classList.remove("active");

===================== */

  state.loans

);

const activeBorrowers = activeLoanBorrowers.size;

const activeLoans = state.loans.filter(l=>l.status==="active").length;

let dueCount = 0;
let overdueCount = 0;
let next7Days = 0;

const nextWeek = new Date(today.getTime() + 7*86400000);

state.collections.forEach(c=>{
  const d = new Date(c.date);
  d.setHours(0,0,0,0);
  if(d.getTime()===today.getTime()){
    todayCollection += c.amount;
  }
});

  state.borrowers.map(b => [b.id, b])
);

const loanMap = Object.fromEntries(
  state.loans.map(l => [l.id, l])
);

state.installments.forEach(i=>{
  if(!i.dueDate) return;

  const due = new Date(i.dueDate);
  due.setHours(0,0,0,0);

  if(due.getTime()===today.getTime()) dueCount++;
  if(due < today) overdueCount++;

  if(due > today && due <= nextWeek) next7Days++;
});

window.createBorrower = async () => {

  const nameInput = document.getElementById("newName");
  const phoneInput = document.getElementById("newPhone");

  const name = nameInput.value.trim();
  const phone = phoneInput.value.trim();

  const phoneRegex = /^[0-9]{10}$/;

  // Name required
  if (!name) {
    showToast("Name is required ⚠️");
    return;
  }

  // Block numbers
  if (/[0-9]/.test(name)) {
    showToast("Name cannot contain numbers ⚠️");
    return;
  }

  // Block special characters
  if (/[!@#$%^&*()_+=\[\]{};:"\\|,.<>/?`~]/.test(name)) {
    showToast("Name cannot contain symbols ⚠️");
    return;
  }

  // Phone validation
  if (!phoneRegex.test(phone)) {
    showToast("Phone number must be exactly 10 digits ⚠️");
    return;
  }

  const existing = state.borrowers.find(b => b.phone === phone);

  if (existing) {
    showToast(`Number already exists under ${existing.name} ❗`);
    return;
  }

  openConfirm(`Add borrower "${name}"?`, async () => {

    try{

await addDoc(collection(db,"borrowers"),{
  name,
  nameLower:name.toLowerCase(),
  phone,
  agentId:uid,
  ownerId:ownerId,
  createdAt:Date.now()
});

}catch(err){
  console.error(err);
  showToast("Failed to add borrower ❌");
}

showToast(t("borrowerAdded"));

    nameInput.value = "";
    phoneInput.value = "";

    document.getElementById("addBorrowerBox").innerHTML = "";
  });
};

window.toggleInstallments = (loanId) => {

  const box = document.getElementById("inst-" + loanId);

  // ✅ Collapse previously opened loan
  if (openedLoanId && openedLoanId !== loanId) {
    const prevBox = document.getElementById("inst-" + openedLoanId);
    if (prevBox) prevBox.innerHTML = "";
  }

  // ✅ Close if same clicked
  if (openedLoanId === loanId) {
    box.innerHTML = "";
    openedLoanId = null;
    return;
  }

  openedLoanId = loanId;

  const today = new Date();
  today.setHours(0,0,0,0);

  const list = [
  ...state.installments,
  ...state.completedInstallments
]
.filter(i => i.loanId === loanId)
.sort((a,b)=>a.number-b.number);

  const dueToday = [];
  const overdue = [];
  const pending = [];
  const completed = [];

  list.forEach(i => {

    const due = new Date(i.dueDate);
    due.setHours(0,0,0,0);

    if (i.status === "completed") {
      completed.push(i);
    } 
    else if (due.getTime() === today.getTime()) {
      dueToday.push(i);
    }
    else if (due < today) {
      overdue.push(i);
    } 
    else {
      pending.push(i);
    }
  });

  function renderGroup(title, arr, color){
    if(!arr.length) return "";

    let h = `<h4 style="margin-top:10px;color:${color};">${title}</h4>`;

    arr.forEach(i=>{
      h += `
        <div class="inst-card">
      ${t("installment")} ${i.number}<br>
${t("amount")}: ₹${i.amount}<br>
${t("due")}: ${new Date(i.dueDate).toLocaleDateString()}<br>
${t("status")}: ${i.status}<br><br>
          ${i.status==="pending" ? `
<button class="btn btn-success"
  onclick="confirmMarkPaid('${i.id}','${loanId}','${i.borrowerId}',${i.amount})">
  ${t("markPaid")}
</button>` : ""}
        </div>
      `;
    });

    return h;
  }
  box.innerHTML =
renderGroup(t("dueToday"), dueToday, "#f59e0b") +
renderGroup(t("overdue"), overdue, "#ef4444") +
renderGroup(t("pending"), pending, "#2563eb") +
renderGroup(t("completed"), completed, "#16a34a");

window.createLoan = async () => {

  const principal = Number(document.getElementById("loanAmt").value.replace(/,/g,""));
const interest = Number(document.getElementById("loanInterest").value) || 0;
const count = Number(document.getElementById("loanCount").value);
const interval = Number(document.getElementById("loanInterval").value);
const start = document.getElementById("loanStart").value;

  showToast("All fields required ⚠️");
  return;
}

  showToast("Interest must be between 0 and 100 ⚠️");
  return;
}

if (count > 365){
  showToast("Installments too high ⚠️");
  return;
}

if (count < 1){
  showToast("Installments must be at least 1 ⚠️");
  return;
}

  const startTime = new Date(start).getTime();

  const interestAmount = (principal * interest) / 100;
  const disbursedAmount = principal - interestAmount;
  const installmentAmount = Number((principal / count).toFixed(2));

  // 🔥 OPEN PREVIEW INSTEAD OF CREATING DIRECTLY
  openLoanPreview({
    principal,
    interestAmount,
    disbursedAmount,
    count,
    installmentAmount
  }, async ()=>{

    const ref = await addDoc(collection(db, "loans"), {
      borrowerId: currentProfileId,
      agentId: uid,
      ownerId: ownerId,
      principal,
      interestPercent: interest,
      interestAmount,
      disbursedAmount,
      totalAmount: principal,
      count,
      interval,
      startDate: startTime,
      status: "active",
      createdAt: Date.now()
    });

const promises = [];

for (let i = 0; i < count; i++) {

  promises.push(
    addDoc(collection(db,"installments"),{
      loanId: ref.id,
      borrowerId: currentProfileId,
      agentId: uid,
      ownerId: ownerId,
      number: i + 1,
      amount: installmentAmount,
      dueDate: startTime + ((i + 1) * interval * 86400000),
      status: "pending"

  );

}

await Promise.all(promises);

showToast(t("loanCreated"))
  });
};

/* ========================

======================== */
function formatNumberIndian(x){
  x = x.replace(/,/g,"");

  const lastThree = x.slice(-3);
  const otherNumbers = x.slice(0,-3);

  if(otherNumbers !== ""){
    return otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g,",") + "," + lastThree;
  }

  return lastThree;
}

      return;

    e.target.value = formatNumberIndian(value);
  }

  // UPFRONT INTEREST
  if(e.target.id === "loanInterest"){

    // Optional: cap interest to 100 automatically
    if(Number(value) > 100){

    let value = e.target.value.replace(/\D/g,"");

/* ========================
   REAL SWIPE ENGINE – STABLE
======================== */

let startX = 0;
let startY = 0;
let endX = 0;
let endY = 0;

document.addEventListener("touchstart", e => {

  // 🚫 Don't swipe when touching inputs, buttons or forms
  const tag = e.target.tagName;
if(tag === "INPUT" || tag === "BUTTON" || tag === "SELECT" || tag === "TEXTAREA" || tag === "A"){
  startX = 0;
  startY = 0;
  return;
}

  // 🚫 Don't swipe when modals are open
  const confirmModal = document.getElementById("confirmModal");

if(
  document.querySelector(".preview-modal") ||
  (confirmModal && !confirmModal.classList.contains("hidden"))
){
  return;
}

  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {

  if(startX === 0 && startY === 0) return;

  endX = e.changedTouches[0].clientX;
  endY = e.changedTouches[0].clientY;

  const diffX = endX - startX;
  const diffY = endY - startY;

  const horizontalDistance = Math.abs(diffX);
  const verticalDistance = Math.abs(diffY);

  const MIN_SWIPE_DISTANCE = 150;  // stronger swipe
  const MAX_VERTICAL_ALLOW = 40;   // very small vertical tolerance

  if(
    horizontalDistance > MIN_SWIPE_DISTANCE &&
    verticalDistance < MAX_VERTICAL_ALLOW
  ){

    // 👉 Swipe Left
    if(diffX < 0){
      if(currentView === "dashboard") showBorrowers();
    }

    // 👈 Swipe Right
    if(diffX > 0){
      if(currentView === "borrowers") showDashboard();
      else if(currentView === "profile") showBorrowers();
    }
  }

  startX = 0;
  startY = 0;
});

function animateCounters(){

  document.querySelectorAll(".counter").forEach(el=>{

    const target = +el.getAttribute("data-count");

    if(el.dataset.animated === "true") return;
    el.dataset.animated = "true";

    let count = 0;
    const step = Math.ceil(target / 40);

    const interval = setInterval(()=>{
      count += step;

      if(count >= target){
        el.innerText = target;
        clearInterval(interval);
      } else{
        el.innerText = count;
      }
    },15);

  });
}

function renderSparkline(){

  const svg = document.getElementById("sparklineChart");
  if(!svg) return;

  svg.innerHTML = "";
  svg.setAttribute("viewBox","0 0 200 60");

  const points = [];

  for(let i=6;i>=0;i--){
    const day = new Date(Date.now() - i*86400000);
    day.setHours(0,0,0,0);

    const total = state.collections
      .filter(c=>{
        const d = new Date(c.date);
        d.setHours(0,0,0,0);
        return d.getTime()===day.getTime();
      })
      .reduce((s,c)=>s+c.amount,0);

    points.push(total);
  }

const max = Math.max(...points,1);

  const coords = points.map((v,i)=>{
    const x = i*(200/6);
    const y = 60 - (v/max)*50;
    return `${x},${y}`;
  }).join(" ");

  const poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
  poly.setAttribute("points",coords);
  poly.setAttribute("fill","none");
  poly.setAttribute("stroke","#ffffff");
  poly.setAttribute("stroke-width","3");

  svg.appendChild(poly);
}

  const modal = document.getElementById("confirmModal");
  const text = document.getElementById("confirmText");
  const okBtn = document.getElementById("confirmOkBtn");

  text.innerText = message;
  modal.classList.remove("hidden");

  okBtn.onclick = ()=>{
    onConfirm();
    closeConfirm();
  };
}

window.closeConfirm = function(){
  document.getElementById("confirmModal")
    .classList.add("hidden");
};


</script>

<div class="bottom-nav">
  <div id="tabDashboard" class="tab active" onclick="showDashboard()">
    <span class="icon">🛖</span>
  </div>

  <div id="tabBorrowers" class="tab" onclick="showBorrowers()">
    <span class="icon">🏦</span>
  </div>
</div>



<div id="confirmModal" class="confirm-modal hidden">
  <div class="confirm-card">
    <p id="confirmText"></p>
    <div class="confirm-actions">
      <button onclick="closeConfirm()" class="btn">Cancel</button>
      <button id="confirmOkBtn" class="btn btn-success">Confirm</button>
    </div>
  </div>
</div>


<div id="toast"></div>
<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("./service-worker.js")
  .then(reg => {

    console.log("Service Worker Registered");

    // check updates every 5 minutes
    setInterval(() => {
      reg.update();
    }, 300000);

  });

  navigator.serviceWorker.addEventListener("controllerchange", () => {
    window.location.reload();
  });

}

</script>
